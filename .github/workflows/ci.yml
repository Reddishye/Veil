name: CI

on:
  push:
    branches: [ "1.20", "main" ]
  pull_request:
    branches: [ "1.20", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
        
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: 17
        distribution: 'temurin'
        
    - name: Make gradlew executable
      run: chmod +x ./gradlew
      
    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2
        
    - name: Build Forge
      run: ./gradlew :forge:build --no-daemon --stacktrace
      
    - name: Build Fabric  
      run: ./gradlew :fabric:build --no-daemon --stacktrace
      
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-artifacts
        path: |
          */build/libs/*.jar
          !*/build/libs/*-sources.jar
          !*/build/libs/*-javadoc.jar
        retention-days: 7