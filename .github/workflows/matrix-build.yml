name: Matrix Build

on:
  workflow_dispatch:
    inputs:
      test_build:
        description: 'Run test build across all platforms'
        required: false
        default: true
        type: boolean
  schedule:
    # Weekly full matrix build on Sundays at 3 AM UTC
    - cron: '0 3 * * 0'

jobs:
  matrix-build:
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        java: [17, 21]
        platform: [forge, fabric, neoforge, common]
        
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Set up JDK ${{ matrix.java }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java }}
        distribution: 'temurin'
        
    - name: Make gradlew executable (Unix)
      if: runner.os != 'Windows'
      run: chmod +x ./gradlew
      
    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2
      with:
        gradle-version: wrapper
        
    - name: Build ${{ matrix.platform }} on ${{ matrix.os }} with Java ${{ matrix.java }}
      run: ./gradlew :${{ matrix.platform }}:build --no-daemon --stacktrace
      
    - name: Upload platform artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: ${{ matrix.platform }}-${{ matrix.os }}-java${{ matrix.java }}-artifacts
        path: ${{ matrix.platform }}/build/libs/*.jar
        retention-days: 7
        
  compatibility-check:
    runs-on: ubuntu-latest
    needs: matrix-build
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: 17
        distribution: 'temurin'
        
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: downloaded-artifacts/
        
    - name: Verify artifact compatibility
      run: |
        echo "Checking downloaded artifacts..."
        find downloaded-artifacts/ -name "*.jar" | while read jar; do
          echo "Checking: $jar"
          # Basic jar validation
          unzip -t "$jar" > /dev/null && echo "✓ $jar is valid" || echo "✗ $jar is corrupted"
        done
        
    - name: Generate compatibility report
      run: |
        echo "# Build Compatibility Report" > compatibility-report.md
        echo "Generated on: $(date)" >> compatibility-report.md
        echo "" >> compatibility-report.md
        echo "## Artifacts Generated" >> compatibility-report.md
        find downloaded-artifacts/ -name "*.jar" | sort | while read jar; do
          size=$(stat -c%s "$jar" 2>/dev/null || stat -f%z "$jar" 2>/dev/null || echo "unknown")
          echo "- $(basename $jar) (${size} bytes)" >> compatibility-report.md
        done
        
    - name: Upload compatibility report
      uses: actions/upload-artifact@v4
      with:
        name: compatibility-report
        path: compatibility-report.md
        retention-days: 30