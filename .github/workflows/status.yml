name: Status Check

on:
  workflow_run:
    workflows: ["CI Build", "Test Suite", "Security Scan"]
    types: [completed]
  schedule:
    # Daily status check at 6 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  status-overview:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Generate status report
      run: |
        echo "# Veil Project Status Report" > status-report.md
        echo "Generated on: $(date -u)" >> status-report.md
        echo "" >> status-report.md
        
        echo "## Automated Workflows" >> status-report.md
        echo "- ✅ CI Build (ci.yml)" >> status-report.md
        echo "- ✅ Release Build (release.yml)" >> status-report.md
        echo "- ✅ Test Suite (test.yml)" >> status-report.md
        echo "- ✅ Matrix Build (matrix-build.yml)" >> status-report.md
        echo "- ✅ Maven Publishing (publish-maven.yml)" >> status-report.md
        echo "- ✅ Javadoc Deployment (publish-javadoc.yml)" >> status-report.md
        echo "- ✅ Security Scan (security.yml)" >> status-report.md
        echo "- ✅ Status Check (status.yml)" >> status-report.md
        echo "" >> status-report.md
        
        echo "## Platform Support" >> status-report.md
        echo "- ✅ Forge" >> status-report.md
        echo "- ✅ NeoForge" >> status-report.md
        echo "- ✅ Fabric" >> status-report.md
        echo "- ✅ Common Module" >> status-report.md
        echo "" >> status-report.md
        
        echo "## Development Tools" >> status-report.md
        echo "- ✅ Development Scripts (dev.sh, dev.bat)" >> status-report.md
        echo "- ✅ Automation Documentation (AUTOMATION.md)" >> status-report.md
        echo "- ✅ Updated README with build badges" >> status-report.md
        echo "" >> status-report.md
        
        echo "## Recent Activity" >> status-report.md
        echo "- Last commit: $(git log -1 --format='%h - %s (%cr)')" >> status-report.md
        echo "- Repository: $(git remote get-url origin)" >> status-report.md
        echo "- Branch: $(git branch --show-current)" >> status-report.md
        
        cat status-report.md
        
    - name: Upload status report
      uses: actions/upload-artifact@v4
      with:
        name: status-report-${{ github.run_number }}
        path: status-report.md
        retention-days: 30