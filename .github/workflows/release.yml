name: Release Build

# NOTE: This workflow requires access to several Maven repositories:
# - maven.fabricmc.net (Fabric plugins)
# - maven.minecraftforge.net (Forge plugins)  
# - maven.neoforged.net (NeoForge plugins)
# - repo.spongepowered.org (Sponge/Mixin)
# 
# If builds fail with plugin resolution errors, ensure these repositories
# are accessible from your environment. See AUTOMATION.md for details.

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build'
        required: true
        default: '1.0.0'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: 17
        distribution: 'temurin'
        
    - name: Make gradlew executable
      run: chmod +x ./gradlew
      
    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2
      with:
        gradle-version: wrapper
        
    - name: Get version
      id: get_version
      run: |
        if [[ $GITHUB_REF == refs/tags/* ]]; then
          VERSION=${GITHUB_REF#refs/tags/v}
        elif [[ ${{ github.event_name }} == 'workflow_dispatch' ]]; then
          VERSION=${{ github.event.inputs.version }}
        else
          VERSION=$(grep '^version=' gradle.properties | cut -d'=' -f2)
        fi
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "Building version: $VERSION"
        
    - name: Build all platforms
      run: ./gradlew clean build publish --no-daemon --stacktrace
      env:
        VERSION: ${{ steps.get_version.outputs.VERSION }}
        BUILD_NUMBER: ${{ github.run_number }}
        
    - name: Collect artifacts
      run: |
        mkdir -p release-artifacts
        find . -name "*.jar" -path "*/build/libs/*" ! -name "*-sources.jar" ! -name "*-javadoc.jar" -exec cp {} release-artifacts/ \;
        ls -la release-artifacts/
        
    - name: Upload release artifacts
      uses: actions/upload-artifact@v4
      with:
        name: release-artifacts-${{ steps.get_version.outputs.VERSION }}
        path: release-artifacts/*.jar
        retention-days: 90
        
    - name: Create release
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: release-artifacts/*.jar
        draft: false
        prerelease: false
        generate_release_notes: true
        body: |
          ## Veil ${{ steps.get_version.outputs.VERSION }}
          
          **Supported Minecraft Version:** 1.20.1
          
          ### Platform Support
          - ✅ Forge ${{ vars.FORGE_VERSION || '47.3.1' }}
          - ✅ NeoForge ${{ vars.NEOFORGE_VERSION || '47.1.106' }}  
          - ✅ Fabric ${{ vars.FABRIC_VERSION || '0.92.2+1.20.1' }}
          
          ### Installation
          Download the appropriate JAR file for your mod loader:
          - `veil-forge-*.jar` for Forge
          - `veil-neoforge-*.jar` for NeoForge  
          - `veil-fabric-*.jar` for Fabric
          
          Place the downloaded JAR file in your `mods` folder.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}