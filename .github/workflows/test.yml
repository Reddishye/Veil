name: Test Suite

on:
  push:
    branches: [ "1.20", "main" ]
  pull_request:
    branches: [ "1.20", "main" ]
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  test:
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        java: [17, 21]
        
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Set up JDK ${{ matrix.java }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java }}
        distribution: 'temurin'
        
    - name: Make gradlew executable (Unix)
      if: runner.os != 'Windows'
      run: chmod +x ./gradlew
      
    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2
      with:
        gradle-version: wrapper
        
    - name: Run tests
      run: ./gradlew test --no-daemon --stacktrace --continue
      
    - name: Generate test report
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: Test Results (${{ matrix.os }}, Java ${{ matrix.java }})
        path: '*/build/test-results/test/*.xml'
        reporter: java-junit
        fail-on-error: false
        
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ matrix.os }}-java-${{ matrix.java }}
        path: |
          */build/test-results/test/
          */build/reports/tests/test/
        retention-days: 7
        
  integration-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: 17
        distribution: 'temurin'
        
    - name: Make gradlew executable
      run: chmod +x ./gradlew
      
    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2
      with:
        gradle-version: wrapper
        
    - name: Run integration tests
      run: ./gradlew integrationTest --no-daemon --stacktrace || true
      
    - name: Test build across all platforms
      run: |
        echo "Testing Forge build..."
        ./gradlew :forge:build --no-daemon
        
        echo "Testing Fabric build..."
        ./gradlew :fabric:build --no-daemon
        
        echo "Testing NeoForge build..."
        ./gradlew :neoforge:build --no-daemon
        
        echo "Testing Common build..."
        ./gradlew :common:build --no-daemon